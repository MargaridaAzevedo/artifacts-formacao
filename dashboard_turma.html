<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; padding:20px; color:#1e293b; }
h1 { font-size:1.2rem; color:#0f172a; margin-bottom:4px; }
.sub { color:#64748b; font-size:.85rem; margin-bottom:18px; }
.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:18px; }
.stat { background:#fff; border-radius:14px; padding:16px 18px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
.stat .num { font-size:1.8rem; font-weight:800; }
.stat .lbl { font-size:.78rem; color:#64748b; margin-top:2px; }
.positivas .num { color:#16a34a; }
.negativas .num { color:#dc2626; }
.media .num { color:#0369a1; }
.card { background:#fff; border-radius:14px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:14px; }
.card h2 { font-size:.95rem; font-weight:700; margin-bottom:14px; color:#334155; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:.82rem; }
.bar-nome { width:82px; text-align:right; color:#475569; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-wrap { flex:1; background:#f1f5f9; border-radius:99px; height:18px; overflow:hidden; }
.bar-fill { height:18px; border-radius:99px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:.75rem; font-weight:700; color:#fff; transition:width .6s; }
.bar-nota { width:30px; font-weight:700; color:#334155; }
.top-row { display:flex; gap:8px; margin-bottom:6px; }
.pill { border-radius:8px; padding:5px 12px; font-size:.82rem; font-weight:600; }
.pill.up { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
.pill.down { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
.filtro-wrap { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.filtro-btn { border:1px solid #e2e8f0; border-radius:8px; padding:5px 12px; font-size:.8rem; cursor:pointer; background:#f8fafc; color:#475569; transition:all .15s; }
.filtro-btn.ativo { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
table { width:100%; border-collapse:collapse; font-size:.82rem; }
th { text-align:left; color:#64748b; font-size:.75rem; padding:6px 8px; border-bottom:1px solid #e2e8f0; }
td { padding:7px 8px; border-bottom:1px solid #f1f5f9; }
tr:last-child td { border-bottom:none; }
.badge-nota { display:inline-block; border-radius:6px; padding:2px 8px; font-weight:700; font-size:.82rem; }
.badge-pos { background:#f0fdf4; color:#16a34a; }
.badge-neg { background:#fef2f2; color:#dc2626; }
.pie-wrap { display:flex; align-items:center; gap:20px; margin-top:6px; }
svg.donut { flex-shrink:0; }
.legend { font-size:.82rem; }
.legend div { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>
<h1>📊 Resultados do Teste — 7.º A | Matemática</h1>
<div class="sub">Unidade 3: Equações · 15 alunos · Maio 2026</div>

<div class="grid">
  <div class="stat positivas"><div class="num" id="n-pos">—</div><div class="lbl">Positivas (≥50%)</div></div>
  <div class="stat negativas"><div class="num" id="n-neg">—</div><div class="lbl">Negativas (&lt;50%)</div></div>
  <div class="stat media"><div class="num" id="n-med">—</div><div class="lbl">Média da turma</div></div>
</div>

<div class="card">
  <h2>🏆 Destaques</h2>
  <div style="margin-bottom:8px; font-size:.8rem; color:#64748b;">Melhores resultados</div>
  <div class="top-row" id="top-up"></div>
  <div style="margin-bottom:8px; margin-top:10px; font-size:.8rem; color:#64748b;">A necessitar de apoio</div>
  <div class="top-row" id="top-down"></div>
</div>

<div class="card">
  <h2>📈 Notas por aluno</h2>
  <div id="barras"></div>
</div>

<div class="card">
  <h2>🔍 Tabela filtrável</h2>
  <div class="filtro-wrap">
    <button class="filtro-btn ativo" onclick="filtrar('todos',this)">Todos (15)</button>
    <button class="filtro-btn" onclick="filtrar('pos',this)">Positivas</button>
    <button class="filtro-btn" onclick="filtrar('neg',this)">Negativas</button>
    <button class="filtro-btn" onclick="filtrar('top',this)">Top 5</button>
  </div>
  <table>
    <thead><tr><th>#</th><th>Aluno</th><th>Nota</th><th>Resultado</th></tr></thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>
const dados = [
  {n:'Ana',v:78},{n:'Bernardo',v:45},{n:'Catarina',v:91},{n:'David',v:33},{n:'Eva',v:67},
  {n:'Filipe',v:88},{n:'Gabriela',v:52},{n:'Henrique',v:71},{n:'Inês',v:44},{n:'João',v:95},
  {n:'Laura',v:38},{n:'Miguel',v:83},{n:'Nuno',v:61},{n:'Olga',v:29},{n:'Pedro',v:77}
].sort((a,b)=>b.v-a.v);

const pos = dados.filter(d=>d.v>=50);
const neg = dados.filter(d=>d.v<50);
const media = (dados.reduce((s,d)=>s+d.v,0)/dados.length).toFixed(1);

document.getElementById('n-pos').textContent = pos.length;
document.getElementById('n-neg').textContent = neg.length;
document.getElementById('n-med').textContent = media + '%';

// Destaques
const top3 = [...dados].slice(0,3);
const bot3 = [...dados].sort((a,b)=>a.v-b.v).slice(0,3);
document.getElementById('top-up').innerHTML = top3.map(d=>`<span class="pill up">⭐ ${d.n} — ${d.v}%</span>`).join('');
document.getElementById('top-down').innerHTML = bot3.map(d=>`<span class="pill down">⚠️ ${d.n} — ${d.v}%</span>`).join('');

// Barras
const sorted = [...dados].sort((a,b)=>b.v-a.v);
document.getElementById('barras').innerHTML = sorted.map(d=>{
  const pct=d.v; const col=d.v>=70?'#16a34a':d.v>=50?'#f59e0b':'#dc2626';
  return `<div class="bar-row">
    <span class="bar-nome">${d.n}</span>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}">${pct}%</div></div>
    <span class="bar-nota">${pct}</span>
  </div>`;
}).join('');

// Tabela
let filtroAtivo='todos';
function filtrar(f, btn) {
  filtroAtivo=f;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderTabela();
}
function renderTabela() {
  let lista = [...dados].sort((a,b)=>b.v-a.v);
  if(filtroAtivo==='pos') lista=lista.filter(d=>d.v>=50);
  else if(filtroAtivo==='neg') lista=lista.filter(d=>d.v<50);
  else if(filtroAtivo==='top') lista=lista.slice(0,5);
  document.getElementById('tabela').innerHTML = lista.map((d,i)=>`
    <tr>
      <td style="color:#94a3b8;font-size:.75rem">${i+1}</td>
      <td style="font-weight:600">${d.n}</td>
      <td><span class="badge-nota ${d.v>=50?'badge-pos':'badge-neg'}">${d.v}%</span></td>
      <td>${d.v>=70?'✅ Bom':d.v>=50?'🆗 Suficiente':'❌ Negativa'}</td>
    </tr>`).join('');
}
renderTabela();
</script>
</body>
</html>
